openapi: 3.1.0
info: 
  title: Fédération de collectivités agricoles
  version: 1.0.0

servers: 
  - url: http://localhost:8080 

paths: 
  /collectivities:
    post: 
      description: Create a new collectivity
      operationId: newCollectivities

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivities'

      responses:
        '201':
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivities'
                

        '400':
          description: Collectivity creation not satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Collectivity creation not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /collectivities/{id}/members: 
    post:
      description: Add new member
      tags: 
        - New Members 
      parameters:
        - name: id
          in: path
          required: true
          schema: 
            type: integer
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              type : object
              properties:
                Sponsors: 
                  properties:
                    sponsorId:
                      type: integer
                NewMemberInformations: 
                  $ref: "#/components/schemas/Members"
                Transaction: 
                  $ref: "#/components/schemas/Transaction"
      responses: 
        '201':
          description: Welcome to our collectivity
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  Sponsors: 
                    properties:
                      sponsorId:
                        type: integer
                  NewMemberInformations: 
                    $ref: "#/components/schemas/Members"
                  Transaction: 
                    $ref: "#/components/schemas/Transaction"
                       
        '400': 
          description: Information incomplete
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example: 
                message: You must complete all the informations about the new member
                status: 400
        '403':
          description: Admission not authorized 
          content: 
            application/json:
              schema: 
                $ref: "#/components/schemas/Error"
              example: 
                message: Your profile does not meet the requirements for membership
                status: 403

components:
  schemas:
    Collectivities:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        ville:
          type: string
        speciality:
          type: string
        creationDateTime:
          type: string
          format: date-time
    Members:
      type: object
      properties:
        id: 
          type: integer
          format: byte64
        name: 
          type: string
        birthdate: 
          type: string
          format: date
        gender: 
          type: string
          enum: 
            - male
            - female
        address: 
          type: string
        occupation: 
          type: string
        phone: 
          type: string
        email: 
          type: string
          format: email 
    Transaction: 
      required:
        - references
        - amount
        - status
      type: object
      properties:
        references: 
          type: string
        amount:
          type: number
        payment: 
          type: string
        status: 
          type: string
          enum: 
            - SUCCESS
            - FAILURE
        transactionDate: 
          type: string
          format: date-time   
    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer