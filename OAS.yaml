openapi: 3.1.0
info: 
  title: Fédération de collectivités agricoles
  version: 1.0.0

servers: 
  - url: http://localhost:8080 

paths: 
  /collectivities:
    post: 
      description: Create a new collectivity
      operationId: newCollectivities

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivities'

      responses:
        '201':
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivities'

        '400':
          description: Collectivity creation not satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Collectivity creation not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Collectivities:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        ville:
          type: string
        speciality:
          type: string
        creationDateTime:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer