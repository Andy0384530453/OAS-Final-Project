tags:
  - name: Community
    description: Management of agricultural communities
  - name: Members
    description: Member management
  - name: Contribution
    description: Contributions and transfers
  - name: Accounts
    description: Cash position management
  - name: Activities
    description: Community and federation activities
  - name: Attendance
    description: Member attendance tracking
  - name: Statistics
    description: Community and member statistics
  - name: FederationStatistics
    description: Global federation statistics

paths:
  /collectivities:
    post:
      description: Create a new collectivity
      operationId: newCollectivities
      tags:
        - Collectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Collectivity"
      responses:
        '201':
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collectivity"
        '400':
          description: Collectivity creation not satisfied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: You must complete the informations about the collectivity
                status: 400
        '403':
          description: Collectivity creation not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: The new Collectivity need to follow all the requirement
                status: 400


paths:

  /communities:
    post:
      summary: Create a new community
      description: >
        Creates a new agricultural community. Required conditions: at least 10 registered members
        with at least 6 months seniority within the federation, specific positions must be filled,
        and formal authorization from the federation is required.
      operationId: createCommunity
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:

              $ref: '#/components/schemas/Community'
            example:
              name: Agricultural Community of Vakinankaratra
              city: Antsirabe
              specialty: Rice cultivation

              type: object
              properties:
                sponsorId:
                  type: integer
                NewMemberInformations:
                  $ref: "#/components/schemas/Member"
                Transaction:
                  $ref: "#/components/schemas/Transaction"
              example:
                sponsorId: 12
                NewMemberInformations:
                  id: 134
                  name: Rivo Andrianantenaina
                  birthdate: "1988-11-02"
                  gender: male
                  address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                  occupation: collector
                  phone: "+261 34 12 345 67"
                  email: rivo.andria@example.mg
                  collectivityId: 3
                Transaction:
                  references: PAR-MDG-20260416-089
                  amount: 50000
                  payment: Orange_money
                  status: success
                  transactionDate: 2026-04-16T09:15:22.123Z

      responses:
        '201':
          description: Community successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Community'
              example:

                id: 5
                name: Agricultural Community of Vakinankaratra
                city: Antsirabe
                specialty: Rice cultivation
                creationDateTime: "2026-04-21T08:00:00.000Z"

                sponsorId: 12
                NewMemberInformations:
                  id: 134
                  name: Rivo Andrianantenaina
                  birthdate: "1988-11-02"
                  gender: male
                  address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                  occupation: collector
                  phone: "+261 34 12 345 67"
                  email: rivo.andria@example.mg
                  collectivityId: 3
                Transaction:
                  references: PAR-MDG-20260416-089
                  amount: 50000
                  payment: Orange_money
                  status: SUCCESS
                  transactionDate: 2026-04-16T09:15:22.123Z

        '400':
          description: Incomplete community information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Please complete all community information
                status: 400
        '403':
          description: Unauthorized creation — conditions not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: The new community must meet all required conditions
                status: 403

  
  /communities/{id}/members:
    post:
      summary: Register a new member in a community
      description: >
        Admits a new member to a community according to the new admission conditions (B-2)
        effective since 04/21/2026. The candidate must be sponsored by at least two confirmed
        members of the federation, with the number of sponsors from the target community being
        at least equal to the number of sponsors from other communities. They must provide their
        personal information and the nature of their relationship with each sponsor. They must pay
        membership fees of 50,000 MGA as well as all mandatory annual contributions imposed by the
        community, via mobile money or bank transfer.
      operationId: addMember
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberRegistrationRequest'
            example:
              sponsors:
                - memberId: 12
                  communityId: 3
                  relationshipWithCandidate: friend
                - memberId: 27
                  communityId: 3
                  relationshipWithCandidate: colleague
              newMemberInformation:
                name: Rivo Andrianantenaina
                birthdate: "1988-11-02"
                gender: male
                address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                occupation: collector
                phone: "+261 34 12 345 67"
                email: rivo.andria@example.mg
                communityId: 3
              transactions:
                - reference: PAR-MDG-20260421-001
                  amount: 50000
                  payment: ORANGE_MONEY
                  status: SUCCESS
                  transactionDate: "2026-04-21T09:15:22.123Z"
                - reference: PAR-MDG-20260421-002
                  amount: 200000
                  payment: BANK_TRANSFER
                  status: SUCCESS
                  transactionDate: "2026-04-21T09:16:00.000Z"
      responses:
        '201':
          description: Member successfully admitted to the community
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
              example:
                id: 134
                name: Rivo Andrianantenaina
                birthdate: "1988-11-02"
                gender: male
                address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                occupation: collector
                phone: "+261 34 12 345 67"
                email: rivo.andria@example.mg
                communityId: 3
        '400':
          description: Incomplete information for the new member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Please complete all information for the new member
                status: 400
        '403':
          description: >
            Admission not authorized — sponsorship conditions not met
            (e.g., insufficient number of sponsors, imbalance between communities,
            or incomplete payment)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: The number of sponsors from the target community must be at least equal to the number of external sponsors
                status: 403
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=3 not found
                status: 404

  
  /members/{id}:
    put:
      summary: Update member information or change community
      description: >
        Updates a member's personal information or transfers the member to another community
        (e.g., in case of city change).
      operationId: updateMember
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
          example: 17
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Member'
            example:
              id: 17
              name: Miora Faniry Razafimahatratra
              birthdate: "1992-03-18"
              gender: female
              address: Lot VA 15 Ter, Andoharanofotsy, Antananarivo 102
              occupation: collector
              phone: "+261 32 98 765 43"
              email: miora.faniry@example.mg
              communityId: 3
      responses:
        '200':
          description: Member information successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
              example:
                id: 17
                name: Miora Faniry Razafimahatratra
                birthdate: "1992-03-18"
                gender: female
                address: Lot VA 15 Ter, Andoharanofotsy, Antananarivo 102
                occupation: collector
                phone: "+261 32 98 765 43"
                email: miora.faniry@example.mg
                communityId: 3
        '400':
          description: Incomplete or invalid information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: The provided information is incomplete or invalid
                status: 400
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Member id=17 not found
                status: 404

    delete:
      summary: Member resignation
      description: Allows a member to resign from their community.
      operationId: deleteMember
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
          example: 17
      responses:

        '204':
          description: Member successfully removed

        '200':
          description: You left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
              example:
                id: 17
                name: Miora Faniry Razafimahatratra
                birthdate: "1992-03-18"
                gender: female
                address: Lot VA 15 Ter, Andoharanofotsy, Antananarivo 102
                occupation: collector
                phone: "+261 32 98 765 43"
                email: miora.faniry@example.mg
                collectivityId: 3 

        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Member id=17 not found
                status: 404

  
  /communities/{id}/contributions:
    post:
      summary: Record a member's contribution
      description: >
        Records a member's contribution to their community. The contribution can be
        periodic (monthly or yearly) or one-time. The treasurer keeps track of the amount,
        collection date, and payment method.
      operationId: payContribution
      tags:
        - Contribution
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contribution'
            example:
              memberId: 134
              communityId: 4
              period: "2026-04"
              contributionPeriod: MONTHLY
              nature: REGULAR
              receiptNumber: REC-20260417-001
              collectedBy: 42
              transaction:
                reference: CONT-20260417-089
                amount: 50000
                payment: ORANGE_MONEY
                status: SUCCESS
                transactionDate: "2026-04-17T07:30:34.267Z"
      responses:
        '201':

          description: Contribution successfully recorded

          description: Your contribution is payed

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
              example:
                id: 456
                memberId: 134
                communityId: 4
                period: "2026-04"
                contributionPeriod: MONTHLY
                nature: REGULAR
                receiptNumber: REC-20260417-001
                collectedBy: 42
                transaction:
                  reference: CONT-20260417-089
                  amount: 50000
                  payment: ORANGE_MONEY
                  status: SUCCESS

                  transactionDate: "2026-04-17T07:30:34.267Z"
                federationShare: 4000
                transferredToFederation: false

                  transactionDate: 2026-04-17T07:30:34.267Z
                federationShare: 4000
                transferredToFederation: true

        '400':
          description: Incomplete information or community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=4 not found
                status: 400
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Member id=134 not found
                status: 404

    get:
      summary: Get community contributions
      description: >
        Returns the list of contributions recorded for a community,
        including details of the share transferred to the federation.
      operationId: getContributions
      tags:
        - Contribution
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
        - name: period
          in: query
          required: false
          description: Filtering period in YYYY-MM format
          schema:
            type: string
          example: "2026-04"
      responses:
        '200':
          description: List of community contributions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contribution'
              example:
                - id: 456
                  memberId: 134
                  communityId: 4
                  period: "2026-04"
                  contributionPeriod: MONTHLY
                  nature: REGULAR
                  receiptNumber: REC-20260417-001
                  collectedBy: 42
                  transaction:
                    reference: CONT-20260417-089
                    amount: 50000
                    payment: ORANGE_MONEY
                    status: SUCCESS
                    transactionDate: "2026-04-17T07:30:34.267Z"
                  federationShare: 4000
                  transferredToFederation: true
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=4 not found
                status: 404

  /communities/{id}/contributions/federation-transfer:
    post:
      summary: Transfer contribution share to federation
      description: >
        Transfers the percentage of periodic contributions due to the federation
        for a given period.
      operationId: transferContributionToFederation
      tags:
        - Contribution
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederationTransferRequest'
            example:
              period: "2026-04"
              transferConfirm: true
      responses:
        '200':
          description: Transfer successfully completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationTransferResponse'
              example:
                transferredAmount: 10000
                contributionsCount: 5
                transferDate: "2026-04-30T23:59:59Z"
                transaction:
                  reference: FED-TRF-20260430-001
                  amount: 10000
                  payment: BANK_TRANSFER
                  status: SUCCESS
                  transactionDate: "2026-04-30T23:59:59Z"
        '400':
          description: Missing period or missing confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Please confirm the transfer and specify the period
                status: 400
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=4 not found
                status: 404

  /communities/{id}/accounts:
    post:

      summary: Add a cash account to a community
      description: >
        Adds an account (bank, mobile money, or cash box) to a community's treasury.
        A community can only have one cash box, but multiple bank or mobile money accounts.
      operationId: createCommunityAccount
      tags:
        - Accounts

      description: add treasury account
      operationId: createCollectivityAccount
      tags: 
        - Account

      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
            example:
              typeAccount: BOA
              holderName: Imerina Agricultural Community
              accountDetail:
                bankCode: "00006"
                branchCode: "00789"
                accountNumber: "00123456789"
                ribKey: "14"
      responses:
        '201':
          description: Account successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              example:

                id: 8
                typeAccount: BOA
                holderName: Imerina Agricultural Community
                accountDetail:
                  bankCode: "00006"
                  branchCode: "00789"
                  accountNumber: "00123456789"
                  ribKey: "14"
                balance: 0

                message: Collectivity.id=19 is not found
                status: 404

    get:
      description: get account
      tags: 
        - Account
      operationId: getCollectivityAccounts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: find account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Collectivity.id={id} is not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Collectivity.id=19 is not found
                status: 404

  /collectivities/{id}/activities:
    post:
      tags:
        - Activities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Activity"
            example:
              title: Formation techniques agricoles
              Activitytype: JUNIOR_TRAINING
              date: "2026-04-28"
              frequencyDate:
                frequency: MONTHLY
                dayOfWeek: 6
                weekOfMonth: 4
                startDate: "2026-01-01"
                endDate: "2026-12-31"
              presence: OBLIGATORY
              members: JUNIOR_ONLY
      responses:
        '201':
          description: New activity added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
              example:
                title: Assemblée générale mensuelle - Avril 2026
                Activitytype: GENERAL_MEETING
                date: null
                frequencyDate:
                  frequency: MONTHLY
                  dayOfWeek: 4
                  weekOfMonth: 2
                  startDate: "2026-01-01"
                  endDate: "2026-12-31"
                presence: OBLIGATORY
                members: ALL
        '404':
          description: The collectivity from id={id} is not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: The collectivity from id=909 is not found
                status: 404

        '400':
          description: Invalid account information or cash box already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: A cash box already exists for this community
                status: 400
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=4 not found
                status: 404

    get:
      summary: Get community cash accounts
      description: Returns the list of all cash accounts for a community with their balances.
      operationId: getCommunityAccounts
      tags:
        - Accounts
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
      responses:
        '200':
          description: List of community accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=4 not found
                status: 404

  /communities/{id}/accounts/{accountId}:
    get:
      summary: Get specific account balance
      description: Returns the details and current balance of a cash account.
      operationId: getCommunityAccountById
      tags:
        - Accounts
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 4
        - name: accountId
          in: path
          required: true
          description: Account identifier
          schema:
            type: integer
          example: 8
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Community or account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Account id=8 for community id=4 not found
                status: 404

  /communities/{id}/activities:
    post:
      summary: Create an activity for a community
      description: >
        Creates a new activity for a community (monthly general assembly,
        junior training, exceptional activity). For recurring activities,
        the recurrence date is defined via recurrenceRules.
      operationId: createCommunityActivity
      tags:
        - Activities
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activity'
            example:
              title: Agricultural techniques training
              activityType: JUNIOR_TRAINING
              date: null
              recurrenceRules:
                frequency: MONTHLY
                dayOfWeek: 6
                weekOfMonth: 4
                startDate: "2026-01-01"
                endDate: "2026-12-31"
              presence: OBLIGATORY
              members: JUNIOR_ONLY
      responses:
        '201':
          description: Activity successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: 10
                title: Agricultural techniques training
                activityType: JUNIOR_TRAINING
                date: null
                recurrenceRules:
                  frequency: MONTHLY
                  dayOfWeek: 6
                  weekOfMonth: 4
                  startDate: "2026-01-01"
                  endDate: "2026-12-31"
                presence: OBLIGATORY
                members: JUNIOR_ONLY
        '400':
          description: Incomplete activity information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Please complete all activity information
                status: 400
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=3 not found
                status: 404

    get:
      summary: Get community activities
      description: Returns the list of all planned activities for a community.
      operationId: getCommunityActivities
      tags:
        - Activities
      parameters:
        - name: id
          in: path
          required: true
          description: Community identifier
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: List of community activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '404':
          description: Community not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Community id=3 not found
                status: 404

  
  /federation/activities:
    post:
      summary: Create a federation activity for all communities
      description: >
        Creates an activity at the federation level, to which all communities
        are invited (e.g., annual federation general assembly).
      operationId: createFederationActivity
      tags:
        - Activities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activity'
            example:
              title: Federation Annual General Assembly - 2026
              activityType: FEDERAL_MEETING
              date: null
              recurrenceRules:
                frequency: YEARLY
                dayOfWeek: 4
                weekOfMonth: 2
                startDate: "2026-01-01"
                endDate: "2026-12-31"
              presence: OBLIGATORY
              members: ALL
      responses:
        '201':
          description: Federation activity successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: 25
                title: Federation Annual General Assembly - 2026
                activityType: FEDERAL_MEETING
                date: null
                recurrenceRules:
                  frequency: YEARLY
                  dayOfWeek: 4
                  weekOfMonth: 2
                  startDate: "2026-01-01"
                  endDate: "2026-12-31"
                presence: OBLIGATORY
                members: ALL
        '400':
          description: Incomplete federation activity information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Please complete all activity information
                status: 400

    get:
      summary: Get federation activities
      description: Returns the list of all planned activities at the federation level.
      operationId: getFederationActivities
      tags:
        - Activities
      responses:
        '200':
          description: List of federation activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'

  
  /activities/{id}/attendance:
    post:

      summary: Record activity attendance
      description: >
        Records the presence or justified absence of a member at an activity.
