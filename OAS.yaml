openapi: 3.1.0
info: 
  title: Fédération de collectivités agricoles
  version: 1.0.0

servers: 
  - url: http://localhost:8080 

paths: 
  /collectivities:
    post: 
      description: Create a new collectivity
      operationId: newCollectivities

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivities'

      responses:
        '201':
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivities'
                

        '400':
          description: Collectivity creation not satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Collectivity creation not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /members: 
    post:
      description: Member inscription
      tags: 
        - Members 
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              type : object
              properties:
                sponsorId:
                  type: integer
                NewMemberInformations: 
                  $ref: "#/components/schemas/Members"
                Transaction: 
                  $ref: "#/components/schemas/Transaction"
            example:
              sponsorId: 12
              NewMemberInformation: 
                id: 134
                name: Rivo Andrianantenaina
                birthdate: 1988-11-02
                gender: male
                address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                occupation: collector
                phone: +261 34 12 345 67
                email: rivo.andria@example.mg
                collectivityId: 3
              Transaction:
                references: PAR-MDG-20260416-089
                amount: 500000
                payment: Orange_money
                status: success
                transactionDate: 2026-04-16T09:15:22.123Z
      responses: 
        '201':
          description: Welcome to our collectivity
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  sponsorId:
                    type: integer
                  NewMemberInformations: 
                    $ref: "#/components/schemas/Members"
                  Transaction: 
                    $ref: "#/components/schemas/Transaction"
              example:
                sponsorId: 12
                NewMemberInformation: 
                  id: 134
                  name: Rivo Andrianantenaina
                  birthdate: 1988-11-02
                  gender: male
                  address: Lot II M 68 Bis, Ambohimanarina, Antananarivo 101
                  occupation: teacher
                  phone: +261 34 12 345 67
                  email: rivo.andria@example.mg
                  collectivityId: 3
                Transaction:
                  references: PAR-MDG-20260416-089
                  amount: 500000
                  payment: Orange_money
                  status: success
                  transactionDate: 2026-04-16T09:15:22.123Z
                       
        '400': 
          description: Information incomplete
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example: 
                message: You must complete all the informations about the new member
                status: 400
        '403':
          description: Admission not authorized 
          content: 
            application/json:
              schema: 
                $ref: "#/components/schemas/Error"
              example: 
                message: Your profile does not meet the requirements for membership
                status: 403
  /members/{id}:
    put:
      description: Change Member informations or collective
      tags: 
        - Members
      parameters:
        - name: id 
          in: path
          required: true
          schema: 
            type: integer
            example: 17
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: "#/components/schemas/Members"
            example: 
              id: 17
              name: Miora Faniry Razafimahatratra
              birthdate: 1992-03-18
              gender: female
              address: Lot VA 15 Ter, Andoharanofotsy, Antananarivo 102
              occupation: collector
              phone: +261 32 98 765 43
              email: miora.faniry@example.mg
              collectivityId: 12

      responses: 
        '200':
          description: Member information updated
          content: 
            application/json:
              schema: 
                $ref: "#/components/schemas/Members"
              example: 
                id: 17
                name: Miora Faniry Razafimahatratra
                birthdate: 1992-03-18
                gender: female
                address: Lot VA 15 Ter,   Andoharanofotsy, Antananarivo 102
                occupation: collector
                phone: +261 32 98 765 43
                email: miora.faniry@example.mg
                collectivityId: 12

        '404':
          description: Member not found
          content: 
            application/json:
              schema: 
                $ref: "#/components/schemas/Error"
              example: 
                message: The member from id={id} is not found
                status: 400
    delete: 
      tags:
       - Members
      description: Do you want to leave 
      parameters: 
        - name : id
          in: path
          required: true
          schema: 
            type: integer
            example: 17
      responses: 
        '200': 
          description: You left 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/Members"
              example: 
                id: 17
                name: Miora Faniry Razafimahatratra
                birthdate: 1992-03-18
                gender: female
                address: Lot VA 15 Ter,   Andoharanofotsy, Antananarivo 102
                occupation: collector
                phone: +261 32 98 765 43
                email: miora.faniry@example.mg
                collectivityId: 12
        '400':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Members"
              example: 
                message: The member from id={id} is not found
                status: 400


components:
  schemas:
    Collectivities:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        ville:
          type: string
        speciality:
          type: string
        creationDateTime:
          type: string
          format: date-time
        collectivityId: 
          type: integer
    Members:
      type: object
      properties:
        id: 
          type: integer
          format: byte64
        name: 
          type: string
        birthdate: 
          type: string
          format: date
        gender: 
          type: string
          enum: 
            - male
            - female
        address: 
          type: string
        occupation: 
          type: string
        phone: 
          type: string
        email: 
          type: string
          format: email 
    Transaction: 
      required:
        - references
        - amount
        - status
      type: object
      properties:
        references: 
          type: string
        amount:
          type: number
        payment: 
          type: string
        status: 
          type: string
          enum: 
            - SUCCESS
            - FAILURE
        transactionDate: 
          type: string
          format: date-time   
    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer