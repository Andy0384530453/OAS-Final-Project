  /federation/statistics:
    get:
      summary: Global federation report for a given period
      description: >
        Returns the monthly or annual global report of the federation, consolidating
        data from all communities: global attendance rate per community, percentage
        of members up-to-date with contributions per community, and number of new
        members per community over the period. This data is presented during annual
        general assemblies.
      operationId: getFederationStatistics
      tags:
        - FederationStatistics
      parameters:
        - name: from
          in: query
          required: true
          description: Period start date (YYYY-MM-DD format)
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: to
          in: query
          required: true
          description: Period end date (YYYY-MM-DD format)
          schema:
            type: string
            format: date
          example: "2026-04-30"
      responses:
        '200':
          description: Global federation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationStatisticsReport'
              example:
                period:
                  from: "2026-01-01"
                  to: "2026-04-30"
                communitiesStats:
                  - communityId: 1
                    communityName: Imerina Agricultural Community
                    globalAttendanceRate: 82.5
                    upToDateContributionRate: 91.3
                    newMembersCount: 14
                  - communityId: 2
                    communityName: Agricultural Community of Vakinankaratra
                    globalAttendanceRate: 74.0
                    upToDateContributionRate: 85.6
                    newMembersCount: 7
        '400':
          description: Missing or invalid period parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: The 'from' and 'to' parameters are required
                status: 400

  /federation/statistics/reports:
    post:
      summary: Submit consolidated federation monthly report
      description: >
        Allows the federation secretary to submit the consolidated monthly report
        gathering data from all communities for archiving and presentation during
        general assemblies.
      operationId: submitFederationMonthlyReport
      tags:
        - FederationStatistics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederationMonthlyReport'
            example:
              month: "2026-04-01"
              communitiesStats:
                - communityId: 1
                  communityName: Imerina Agricultural Community
                  globalAttendanceRate: 82.5
                  upToDateContributionRate: 91.3
                  newMembersCount: 14
                - communityId: 2
                  communityName: Agricultural Community of Vakinankaratra
                  globalAttendanceRate: 74.0
                  upToDateContributionRate: 85.6
                  newMembersCount: 7
      responses:
        '201':
          description: Federation monthly report successfully submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationMonthlyReport'
              example:
                month: "2026-04-01"
                communitiesStats:
                  - communityId: 1
                    communityName: Imerina Agricultural Community
                    globalAttendanceRate: 82.5
                    upToDateContributionRate: 91.3
                    newMembersCount: 14
                  - communityId: 2
                    communityName: Agricultural Community of Vakinankaratra
                    globalAttendanceRate: 74.0
                    upToDateContributionRate: 85.

