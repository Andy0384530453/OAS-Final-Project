openapi: 3.1.0
info: 
  title: Fédération de collectivités agricoles
  version: 1.0.0

servers: 
  - url: http://localhost:8080 

paths: 
  /collectivities:
    post: 
      description: Create a new collectivity
      operationId: newCollectivities

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivities'

      responses:
        '201':
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivities'

        '400':
          description: Collectivity creation not satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Collectivity creation not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /collectivities/members: 
    post:
      description: Add new member 
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              $ref: "#/components/schemas/Members"
      responses: 
        '201':
          description: Welcome to our collectivity
        '400': 
          description: Information incomplete
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example: 
                message: You must complete all the informations about the new member
                code: 400
        '403':
          description: Admission not authorized 
          content: 
            application/json:
              schema: 
                $ref: "#/components/schemas/Error"
              example: 
                message: Your profile does not meet the requirements for membership
                code: 403

components:
  schemas:
    Collectivities:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        ville:
          type: string
        speciality:
          type: string
        creationDateTime:
          type: string
          format: date-time
    Members:
      type: object
      properties:
        id: 
          type: integer
          format: byte64
        name: 
          type: string
        birthdate: 
          type: string
          format: date
        gender: 
          type: string
          enum: 
            - male
            - female
        adress: 
          type: string
        occupation: 
          type: string
        phone: 
          type: string
        email: 
          type: string
          format: email    

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer